---
###############################################################################
# Prepare
###############################################################################
# Vagrant interface block is dynamically generated on creation. Capture network
# interface block for vagrant to enable deterministic testing.

- name: 'Prepare'
  hosts: 'all'
  gather_facts: false
  become: true
  tasks:
    # ansible only provides block writing not reading (blockinfile).
    - name: 'Prepare | cmd | get /etc/network/interfaces vagrant-block'
      ansible.builtin.command:  # noqa command-instead-of-module multiline.
        argv:
          - 'sed'
          - '-n'
          - '/^#VAGRANT-BEGIN/,/^#VAGRANT-END/p'
          - '/etc/network/interfaces'
      changed_when: false
      register: network__test_vagrant_block

    - name: 'Prepare | fact | cache vagrant node network configuration'
      ansible.builtin.set_fact:
        network__test_vagrant: '{{ network__test_vagrant_block.stdout }}'
        cacheable: true

    # ifreload only supports sources, not source-directory.
    - name:
        'Prepare | set sources instead of source-directory (ifreload support)'
      ansible.builtin.lineinfile:
        path: '/etc/network/interfaces'
        regexp: '^source-directory(.*)$'
        line: 'source /etc/network/interfaces.d/*'
