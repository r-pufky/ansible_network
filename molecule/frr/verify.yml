---
###############################################################################
# Verify
###############################################################################
# Verify FRR configuration is correct using cached dynamic vagrant blocks.
#
# Args:
#   network__test_vagrant: str - vagrant network block.
#   network__test_resolv: str - resolv.conf block.

- name: 'Verify'
  hosts: 'all'
  gather_facts: false
  become: true
  tasks:
    - name: 'Verify | assert | fact_caching not expired'
      ansible.builtin.assert:
        quiet: true
        that:
          - ansible_facts['network__test_vagrant'] is defined
        fail_msg: |

          ✘ fact_caching has expired; re-run prepare.

    - name: 'Verify | FRR | gather frr.service status'
      ansible.builtin.command: 'systemctl status frr.service'
      register: network__test_frr
      changed_when: false

    - name: 'Verify | FRR | assert frr.service active'
      ansible.builtin.assert:
        quiet: true
        that:
          - network__test_frr.rc == 0
          - '"Active: active" in network__test_frr.stdout'
        fail_msg: |

          ✘ frr.service should be enabled and active.

- name: 'Verify | enable interface management disabled'
  hosts: 'network-frr-disable-mgmt'
  gather_facts: false
  become: true
  tasks:
    - name: 'Verify | filesystem | query /etc/network/interfaces'
      ansible.builtin.template:
        src: 'template.j2'
        dest: '/etc/network/interfaces'
        owner: 'root'
        group: 'root'
        mode: '0644'
      check_mode: true
      diff: true
      register: network__test_interfaces
      vars:
        content: |+
          # This file describes the network interfaces available on your system
          # and how to activate them. For more information, see interfaces(5).

          {{ ansible_facts['network__test_vagrant'] }}

    - name: 'Verify | assert | /etc/network/interfaces'
      ansible.builtin.assert:
        quiet: true
        that:
          - not network__test_interfaces.changed
        fail_msg: |

          ✘ /etc/network/interfaces is not in expected format.

- name: 'Verify | enable with interfaces.d sources'
  hosts: 'network-frr-enable-src'
  gather_facts: false
  become: true
  tasks:
    - name: 'Verify | filesystem | query /etc/network/interfaces'
      ansible.builtin.template:
        src: 'template.j2'
        dest: '/etc/network/interfaces'
        owner: 'root'
        group: 'root'
        mode: '0644'
      check_mode: true
      diff: true
      register: network__test_interfaces
      vars:
        content: |
          # This file describes the network interfaces available on your system
          # and how to activate them. For more information, see interfaces(5).

          {{ ansible_facts['network__test_vagrant'] }}
          post-up /usr/bin/systemctl restart frr.service
          source /etc/network/interfaces.d/*

    - name: 'Verify | assert | /etc/network/interfaces'
      ansible.builtin.assert:
        quiet: true
        that:
          - not network__test_interfaces.changed
        fail_msg: |

          ✘ /etc/network/interfaces is not in expected format.

    - name: 'Verify | FRR | /etc/frr/frr.conf'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name: 'Verify | FRR | /etc/frr/frr.conf'
        test_src: 'frr.conf'
        test_file: '/etc/frr/frr.conf'
        test_owner: 'frr'
        test_group: 'frr'
        test_mode: '0640'
        test_diff: true

    - name: 'Verify | FRR | /etc/frr/daemons'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name: 'Verify | FRR | /etc/frr/daemons'
        test_src: 'daemons'
        test_file: '/etc/frr/daemons'
        test_owner: 'frr'
        test_group: 'frr'
        test_mode: '0640'
        test_diff: true

- name: 'Verify | enable without interfaces.d sources'
  hosts: 'network-frr-enable-nosrc'
  gather_facts: false
  become: true
  tasks:
    - name: 'Verify | filesystem | query /etc/network/interfaces'
      ansible.builtin.template:
        src: 'template.j2'
        dest: '/etc/network/interfaces'
        owner: 'root'
        group: 'root'
        mode: '0644'
      check_mode: true
      diff: true
      register: network__test_interfaces
      vars:
        content: |+
          # This file describes the network interfaces available on your system
          # and how to activate them. For more information, see interfaces(5).

          {{ ansible_facts['network__test_vagrant'] }}
          post-up /usr/bin/systemctl restart frr.service

    - name: 'Verify | assert | /etc/network/interfaces'
      ansible.builtin.assert:
        quiet: true
        that:
          - not network__test_interfaces.changed
        fail_msg: |

          ✘ /etc/network/interfaces is not in expected format.

    - name: 'Verify | FRR | /etc/frr/frr.conf'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name: 'Verify | FRR | /etc/frr/frr.conf'
        test_src: 'frr.conf'
        test_file: '/etc/frr/frr.conf'
        test_owner: 'frr'
        test_group: 'frr'
        test_mode: '0640'
        test_diff: true

    - name: 'Verify | FRR | /etc/frr/daemons'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name: 'Verify | FRR | /etc/frr/daemons'
        test_src: 'daemons'
        test_file: '/etc/frr/daemons'
        test_owner: 'frr'
        test_group: 'frr'
        test_mode: '0640'
        test_diff: true
