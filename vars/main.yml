---
###############################################################################
# Network Role Options
###############################################################################

network___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-11',
    _debian='trixie',
    _frr='10.4.1',
  ) }}"

###############################################################################
# APT Packages
###############################################################################
# TODO(forky): isc-dhcp-client is officially deprecated in Trixie and should
#     be actively migrated to use systemd-networkd or dhcpcd-base. For now,
#     install with isc-dhcp-client through trixie release; and migrate to
#     systemd-networkd/systemd-resolved or dhcpcd-base in Forky release.
#
# Reference:
# * https://github.com/FRRouting/frr
# * https://www.frrouting.org

network___packages:
  - 'ifupdown2'  # https://packages.debian.org/trixie/ifupdown2 (ifreload).
  - 'isc-dhcp-client'  # https://packages.debian.org/trixie/isc-dhcp-client

network___frr_packages:
  - 'frr'
