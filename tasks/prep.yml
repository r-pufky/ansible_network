---
# yamllint disable rule:line-length
###############################################################################
# Pre Execution Tasks
###############################################################################
# In certain cases the ifupdown2 package does not create the required /etc
# directory during initialization. Manually ensure this directory exists for
# interface state changes to succeed.
#
# Reference:
# * https://forum.proxmox.com/threads/ifreload-a-failed-exit-code-1-when-applying-config-in-networking-solved.141676

- name:
    'Prep | fact | force network_flg_container=true (deb_flg_container)'
  when: deb_flg_container | default(false)
  ansible.builtin.set_fact:
    network_flg_container: true

- name: 'Prep | assert | interfaces defined for interfaces.d'
  when: network_cfg_interfaces_source_enable
  ansible.builtin.assert:
    quiet: true
    that:
      - 'network_cfg_local | length > 0'
    fail_msg: |

      ✘ network_cfg_local must have defined interfaces.

      network_cfg_local must have defined interfaces if
      network_cfg_interfaces_source_enable.

      Otherwise ifreload and post-up will fail.

- name: 'Prep | packages'
  ansible.builtin.include_role:
    name: 'r_pufky.deb.apt'
  vars:
    apt_packages:
      - '{{ network___packages }}'
      - '{{ network_srv_packages }}'
      - '{{ network___frr_packages if network_flg_frr else [] }}'
    apt_packages_absent:
      - '{{ network_srv_packages_absent }}'
    apt_sources: '{{ network_srv_apt_sources }}'
    apt_srv_package_update_cache: true

- name: '{{ "Prep | filesystem | set " ~ network___app._rt_tables_d }}'
  ansible.builtin.file:
    path: '{{ network___app._rt_tables_d }}'
    owner: 'root'
    group: 'root'
    mode: '0755'
    state: 'directory'
