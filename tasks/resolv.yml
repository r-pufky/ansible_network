---
###############################################################################
# Manage /etc/resolv.conf
###############################################################################
# Basic management of /etc/resolv.conf. Sets config and optionally makes it
# immutable. Other packages should manage this file as part of their service.
#
# Reference:
# * https://wiki.debian.org/resolv.conf

- name: 'Resolv | filesystem | set /etc/resolv.conf'
  when: network_cfg_resolv | length > 0
  block:
    - name: 'Resolv | filesystem | set /etc/resolv.conf mutable'
      ansible.builtin.file:
        path: '/etc/resolv.conf'
        attributes: '-i'
      become: true
      diff: true
      register: network__resolv_attr
      changed_when: '"i" not in network__resolv_attr.diff.before.attributes'

    - name: 'Resolv | filesystem | set /etc/resolv.conf'
      notify: 'Handlers | ifreload networking'
      ansible.builtin.template:
        src: 'resolv.conf.j2'
        dest: '/etc/resolv.conf'
        owner: 'root'
        group: 'root'
        mode: '0644'
        force: true

- name: 'Resolv | filesystem | set /etc/resolv.conf immutable'
  when: network_cfg_resolv_immutable
  ansible.builtin.file:
    path: '/etc/resolv.conf'
    attributes: '+i'
  become: true
  diff: true
  register: network__resolv_attr
  changed_when: '"i" not in network__resolv_attr.diff.before.attributes'
